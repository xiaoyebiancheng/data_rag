name: dataset_rag

services:
  mongodb:
    image: mongo:7
    container_name: dataset_rag_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: dataset_rag_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: dataset_rag_etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - etcd-data:/etcd

  milvus:
    image: milvusdb/milvus:v2.5.10
    container_name: dataset_rag_standalone
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      MINIO_ACCESS_KEY_ID: ${MILVUS_MINIO_ACCESS_KEY:?set MILVUS_MINIO_ACCESS_KEY in .env}
      MINIO_SECRET_ACCESS_KEY: ${MILVUS_MINIO_SECRET_KEY:?set MILVUS_MINIO_SECRET_KEY in .env}
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - milvus-minio
    volumes:
      - milvus-data:/var/lib/milvus

  milvus-minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: dataset_rag_milvus_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MILVUS_MINIO_ACCESS_KEY:?set MILVUS_MINIO_ACCESS_KEY in .env}
      MINIO_ROOT_PASSWORD: ${MILVUS_MINIO_SECRET_KEY:?set MILVUS_MINIO_SECRET_KEY in .env}
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - milvus-minio-data:/data

  attu:
    image: zilliz/attu:latest
    container_name: dataset_rag_attu
    restart: unless-stopped
    environment:
      MILVUS_URL: milvus:19530
    ports:
      - "8000:3000"
    depends_on:
      - milvus

  import-api:
    build: .
    container_name: dataset_rag_import_api
    profiles: ["api"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PROJECT_ROOT: /app
      PYTHONPATH: /app
      MONGO_URL: mongodb://mongodb:27017
      MILVUS_URL: http://milvus:19530
      MINIO_ENDPOINT: minio:9000
    command: uvicorn app.import_process.api.import_server:app --host 0.0.0.0 --port 8000
    ports:
      - "18000:8000"
    depends_on:
      - mongodb
      - milvus
      - minio
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs

  query-api:
    build: .
    container_name: dataset_rag_query_api
    profiles: ["api"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PROJECT_ROOT: /app
      PYTHONPATH: /app
      MONGO_URL: mongodb://mongodb:27017
      MILVUS_URL: http://milvus:19530
      MINIO_ENDPOINT: minio:9000
    command: uvicorn app.query_process.api.query_server:app --host 0.0.0.0 --port 8001
    ports:
      - "18001:8001"
    depends_on:
      - mongodb
      - milvus
      - minio
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs

volumes:
  mongo-data:
  minio-data:
  milvus-minio-data:
  etcd-data:
  milvus-data:
